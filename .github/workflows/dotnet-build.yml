name: Build (.NET)

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build solution
        run: dotnet build src/GlobalScout/GlobalScout.slnx -c Release

      - name: Test solution
        run: dotnet test src/GlobalScout/GlobalScout.slnx -c Release --no-build
