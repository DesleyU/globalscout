services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-globalscout}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrator:
    build:
      context: .
      dockerfile: src/api/GlobalScout.Migrator/Dockerfile
    environment:
      ConnectionStrings__globalscout: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-globalscout};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: src/api/GlobalScout.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__globalscout: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-globalscout};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__Issuer: ${JWT_ISSUER:-GlobalScout}
      Jwt__Audience: ${JWT_AUDIENCE:-GlobalScout}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-LocalDockerSigningKey_ChangeMe_Use32CharsMin!!}
      AdminSeed__Email: ${AdminSeed__Email:-}
      AdminSeed__Password: ${AdminSeed__Password:-}
      AvatarStorage__PhysicalAvatarsDirectory: /app/wwwroot/uploads/avatars
      VideoStorage__PhysicalVideosDirectory: /app/wwwroot/uploads/videos
      Stripe__PublicAppBaseUrl: ${PUBLIC_APP_BASE_URL:-http://localhost:8080}
    ports:
      - "${API_PORT:-5288}:8080"
    volumes:
      - uploads-data:/app/wwwroot/uploads
    depends_on:
      migrator:
        condition: service_completed_successfully

  ui:
    build:
      context: .
      dockerfile: src/ui/apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_PORT:-5288}/api
        NEXT_PUBLIC_API_ORIGIN: http://localhost:${API_PORT:-5288}
    ports:
      - "${UI_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  postgres-data:
  uploads-data:
