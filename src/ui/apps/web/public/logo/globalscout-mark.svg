    <path d="M 0,25 L 8,8 L 0,12 L -8,8 Z" fill="#1e3a8a" stroke="#ffffff" stroke-width="0.5"/>
    <path d="M 25,0 L 8,8 L 12,0 L 8,-8 Z" fill="#3b82f6" stroke="#ffffff" stroke-width="0.5"/>
    <path d="M -25,0 L -8,8 L -12,0 L -8,-8 Z" fill="#3b82f6" stroke="#ffffff" stroke-width="0.5"/>
  </g>
  <circle cx="50" cy="50" r="4" fill="#ffffff" stroke="#1e3a8a" stroke-width="1"/>
